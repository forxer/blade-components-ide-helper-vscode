name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o extension.vsix

      # Each publish step runs only when its token secret is configured, so the
      # extension can ship to Open VSX + GitHub Releases before (or without) a
      # VS Marketplace publisher being set up.
      - name: Publish to VS Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --no-dependencies --packagePath extension.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish extension.vsix -p "$OVSX_PAT"

      - name: Attach VSIX to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.vsix
